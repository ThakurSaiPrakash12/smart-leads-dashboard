services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    environment: &backend_env
      PORT: "5000"
      NODE_ENV: "production"
      MONGODB_URI: "mongodb://mongo:27017/smt"
      JWT_SECRET: "change-me"
      JWT_EXPIRES_IN: "7d"
      CLIENT_URL: "http://localhost:5173"
      JWT_COOKIE_NAME: "smt_token"
      SALT_ROUNDS: "10"
      PAGE_LIMIT: "10"
      EXPORT_LIMIT: "5000"
      COOKIE_MAX_AGE_DAYS: "7"
      LOGIN_RATE_WINDOW_MIN: "15"
      LOGIN_RATE_MAX: "20"
      REGISTER_RATE_WINDOW_MIN: "60"
      REGISTER_RATE_MAX: "10"
      JSON_BODY_LIMIT: "1mb"
      ADMIN_NAME: "Admin"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "change-me-123"
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  seed:
    build: ./backend
    profiles:
      - seed
    environment: *backend_env
    depends_on:
      - mongo
    command: ["node", "dist/utils/seed.js"]

volumes:
  mongo_data:
